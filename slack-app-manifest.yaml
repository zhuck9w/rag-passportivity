display_information:
  name: KB Assistant
  description: Ассистент по базе знаний Passportivity (программы по странам)
  background_color: "#1a1a2e"
features:
  bot_user:
    display_name: kb-assistant
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - im:write
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
